appId: com.smartime.app
productName: SmartIME
copyright: Copyright © 2024

directories:
  output: release
  buildResources: resources

files:
  - dist-electron
  - dist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.utilities

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "*.ico"
      - "*.icns"
      - "*.png"
